name: Deploy Blog to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "doc/blog/**"
      - "static/logo.png"
      - "scripts/normalize_blog_posts.py"
      - ".markdownlint-cli2.yaml"
      - ".github/workflows/blog-check.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ./doc/blog

      - name: Build with Jekyll
        working-directory: ./doc/blog
        run: bundle exec jekyll build --destination ../../_site/blog

      - name: Copy shared static logo
        run: |
          mkdir -p ./_site/blog/static
          cp ./static/logo.png ./_site/blog/static/logo.png

      - name: Add root redirect
        run: |
          mkdir -p ./_site
          cat > ./_site/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./blog/">
              <title>Redirecting to Bolt Blog</title>
            </head>
            <body>
              <p>Redirecting to <a href="./blog/">Bolt Blog</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

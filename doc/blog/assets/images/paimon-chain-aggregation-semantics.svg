<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Paimon chain table and aggregation table scan semantics</title>
  <desc id="desc">Chain table branch fallback and aggregation table merge engine are resolved before Bolt executes the returned vectors.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#425466"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .branch { fill: #edf5ff; stroke: #3776d6; stroke-width: 1.4; }
      .agg { fill: #fff3e6; stroke: #c96f18; stroke-width: 1.4; }
      .paimon { fill: #e9f7ef; stroke: #2f8f58; stroke-width: 1.4; }
      .bolt { fill: #f4edf9; stroke: #8b5bb3; stroke-width: 1.4; }
      .label { fill: #1f2937; font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .text { fill: #334155; font-family: Inter, Arial, sans-serif; font-size: 15px; }
      .small { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 13px; }
      .line { stroke: #425466; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow); }
      .note { fill: #0f172a; font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="960" height="560"/>
  <text class="label" x="48" y="48">Where table semantics are resolved</text>
  <text class="text" x="48" y="76">Chain and aggregation tables produce normal scan output only after Paimon applies their table-level rules.</text>

  <rect class="panel" x="48" y="112" width="392" height="262" rx="8"/>
  <text class="note" x="76" y="148">Chain table</text>
  <rect class="branch" x="76" y="176" width="134" height="54" rx="8"/>
  <text class="text" x="111" y="198">snapshot</text>
  <text class="small" x="108" y="216">full data</text>
  <rect class="branch" x="250" y="176" width="134" height="54" rx="8"/>
  <text class="text" x="295" y="198">delta</text>
  <text class="small" x="281" y="216">incremental</text>
  <line class="dash" x1="143" y1="234" x2="205" y2="282"/>
  <line class="dash" x1="317" y1="234" x2="255" y2="282"/>
  <rect class="paimon" x="150" y="286" width="160" height="58" rx="8"/>
  <text class="text" x="175" y="309">Paimon scan</text>
  <text class="small" x="170" y="328">branch fallback</text>

  <rect class="panel" x="520" y="112" width="392" height="262" rx="8"/>
  <text class="note" x="548" y="148">Aggregation table</text>
  <rect class="agg" x="548" y="176" width="136" height="54" rx="8"/>
  <text class="text" x="579" y="198">id = 1</text>
  <text class="small" x="581" y="216">sales 2</text>
  <rect class="agg" x="724" y="176" width="136" height="54" rx="8"/>
  <text class="text" x="755" y="198">id = 1</text>
  <text class="small" x="757" y="216">sales 1</text>
  <line class="dash" x1="616" y1="234" x2="675" y2="282"/>
  <line class="dash" x1="792" y1="234" x2="733" y2="282"/>
  <rect class="paimon" x="622" y="286" width="166" height="58" rx="8"/>
  <text class="text" x="653" y="309">Paimon scan</text>
  <text class="small" x="654" y="328">merge engine</text>

  <line class="line" x1="230" y1="374" x2="393" y2="438"/>
  <line class="line" x1="705" y1="374" x2="543" y2="438"/>
  <rect class="paimon" x="394" y="420" width="150" height="58" rx="8"/>
  <text class="text" x="425" y="443">Arrow batch</text>
  <text class="small" x="421" y="462">logical rows</text>
  <line class="line" x1="549" y1="449" x2="626" y2="449"/>
  <rect class="bolt" x="632" y="420" width="156" height="58" rx="8"/>
  <text class="text" x="672" y="443">Bolt scan</text>
  <text class="small" x="671" y="462">RowVector</text>
  <line class="line" x1="793" y1="449" x2="849" y2="449"/>
  <rect class="bolt" x="854" y="420" width="58" height="58" rx="8"/>
  <text class="small" x="864" y="443">filter</text>
  <text class="small" x="865" y="462">project</text>
</svg>
